<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIBLY – AI News Intelligence</title>
    <link rel="icon" type="image/png" href="quibly-logo.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="logo-area" style="display: flex; align-items: center; gap: 8px;">
            <img src="quibly-logo.png" alt="Quibly Logo" style="width: 28px; height: 28px; border-radius: 6px; object-fit: cover;">
            <h1 style="font-size: 17px; font-weight: 600; letter-spacing: -0.4px; margin: 0; color: var(--text-primary); font-family: 'Inter', sans-serif;">Quibly</h1>
        </div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-trending" style="cursor: pointer;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                For You
            </div>
            <div class="tab" id="tab-bookmarks" style="cursor: pointer;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                Bookmarks
            </div>
            <div class="tab" id="nav-new-chat-btn" style="cursor: pointer;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </div>
        </div>
        <div class="nav-actions" style="display: flex; align-items: center; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 30px; padding: 4px 6px; box-shadow: var(--shadow-sm);">
            <div class="theme-switch" id="theme-toggle" style="background: transparent; border: none; padding: 2px;">
                <span class="icon sun" style="width: 26px; height: 26px; font-size: 13px;">🔆</span>
                <span class="icon moon" style="width: 26px; height: 26px; font-size: 13px;">🌙</span>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <!-- Left Sidebar: Old Chats -->
        <aside class="left-sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 class="section-title" style="margin-bottom: 0;">OLD CHATS</h2>
                <button id="new-chat-btn" title="New Chat" style="background: none; border: none; color: var(--accent); cursor: pointer;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
            </div>
            <div class="search-bar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Search your chats...">
            </div>
            
            <div class="chat-history-list">
                <!-- Chat history will appear here -->
            </div>
            
            <button class="clear-history-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> 
                Clear All History
            </button>
            
            <div id="bottom-auth-container" style="margin-top: auto; border-top: 1px solid var(--border-color); padding-top: 16px; width: 100%;">
                <div id="auth-area" style="display: flex; flex-direction: column; gap: 8px;">
                    <button id="login-btn" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-main); color: var(--text-primary); cursor: pointer; font-weight: 600; text-align: center; font-size: 14px; transition: all 0.2s;">Log In</button>
                    <button id="signup-btn" style="width: 100%; padding: 10px; border: none; border-radius: 8px; background: var(--text-primary); color: var(--bg-main); cursor: pointer; font-weight: 600; text-align: center; font-size: 14px; transition: all 0.2s;">Sign Up</button>
                </div>
                
                <div id="profile-area" style="display: none; align-items: center; justify-content: space-between; padding: 10px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-main);">
                    <div style="display: flex; align-items: center; gap: 10px; overflow: hidden;">
                        <div id="user-avatar" style="width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; flex-shrink: 0; text-transform: uppercase;">U</div>
                        <div style="display: flex; flex-direction: column; overflow: hidden;">
                            <span id="username-display" style="font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;"></span>
                        </div>
                    </div>
                    <button id="logout-btn" style="border: none; background: transparent; color: var(--text-secondary); cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color 0.2s;" title="Logout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <div class="chat-wrapper">
                <div id="chat-box" class="chat-box">
                    <div class="welcome-screen" id="welcome-screen" style="margin: auto; text-align: center; padding-top: 8vh; max-width: 400px; display: flex; flex-direction: column; align-items: center;">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 24px; opacity: 0.8;"><path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"></path></svg>
                        <h2 style="font-size: 26px; font-weight: 500; color: var(--text-primary); margin-bottom: 12px; letter-spacing: -0.5px;">Understand your news.</h2>
                        <p style="font-size: 15px; color: var(--text-secondary); line-height: 1.5;">Drop a headline, search for global events, or ask anything.</p>
                    </div>
                </div>
                        


                <div id="all-news-container" class="all-news-container" style="display: none;"></div>



                <div class="input-area">
                    <form id="chat-form">
                        <span class="chat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></span>
                        <input type="text" id="user-input" placeholder="Enter a headline or ask a question..." autocomplete="off">
                        <button type="submit" id="send-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </main>

        <!-- Right Sidebar: Global News -->
        <aside class="right-sidebar sidebar">
            <div class="sidebar-header">
                <h2><span class="dot">●</span> TOP GLOBAL NEWS</h2>
                <button id="refresh-news-btn" title="Refresh Headlines"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></button>
            </div>
            <div id="news-list" class="news-list">
                <div class="news-loading">Loading breaking news...</div>
            </div>
        </aside>
    </div>



    <!-- Auth Modal -->
    <div id="auth-modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
        <div style="background-color: var(--bg-panel); padding: 40px; border-radius: 16px; width: 90%; max-width: 360px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; display: flex; flex-direction: column;">
            <svg id="close-modal" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; right: 20px; top: 20px; cursor: pointer; color: var(--text-secondary);"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            <h2 id="auth-title" style="margin-bottom: 24px; text-align: center; font-size: 22px; font-weight: 600; color: var(--text-primary);">Log In</h2>
            <form id="auth-form" style="display: flex; flex-direction: column; gap: 16px;">
                <input type="email" id="auth-username" placeholder="Gmail Address (@gmail.com)" required style="padding: 14px 16px; border: none; border-radius: 10px; background: var(--msg-user); color: var(--text-primary); font-size: 14px; outline: none;">
                <input type="password" id="auth-password" placeholder="Password" required style="padding: 14px 16px; border: none; border-radius: 10px; background: var(--msg-user); color: var(--text-primary); font-size: 14px; outline: none;">
                <div id="auth-error" style="color: #ef4444; font-size: 13px; display: none; text-align: center; font-weight: 500;"></div>
                <button type="submit" id="auth-submit" style="padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 15px; margin-top: 4px; transition: background 0.2s;">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary);">
                <a href="#" id="toggle-auth" style="color: var(--accent); text-decoration: none; font-weight: 500;">Need an account? Sign up</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
